services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3005
      - REDIS_URL=redis://redis:6379
      - ADMIN_TOKEN=synset_admin_2026
      - WEBHOOK_URL=https://n8n.synsetsolutions.com/webhook/nuevo-lead
    ports:
      - "3006:3005"
    depends_on:
      - redis
    networks:
      - chatbot_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - chatbot_net

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - chatbot_net

  manager:
    build:
      context: ./chatbot-manager
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - CHATBOT_API_URL=http://chatbot:3005
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - FLASK_PORT=8089
    ports:
      - "8089:8089"
    depends_on:
      - redis
      - chatbot
    networks:
      - chatbot_net

networks:
  chatbot_net:
    driver: bridge

volumes:
  redis_data:
  redisinsight_data:
